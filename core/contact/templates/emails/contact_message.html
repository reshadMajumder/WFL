<!DOCTYPE html>
<html>
<head>
    <title>Contact Message</title>
</head>
<body>
    <h1>New Contact Message</h1>
    <p><strong>Name:</strong> {{ contact_message.name }}</p>
    <p><strong>Email:</strong> {{ contact_message.email }}</p>
    <p><strong>Company:</strong> {{ contact_message.company_name }}</p>
    <p><strong>Phone:</strong> {{ contact_message.phone }}</p>
    <p><strong>Subject:</strong> {{ contact_message.subject }}</p>
    <p><strong>Message:</strong></p>
    <pre>{{ contact_message.message }}</pre>
</body>
</html>
